services:
  mongodb:
    image: mongo:7
    container_name: agrinova-mongodb
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db

  ai-service:
    build:
      context: ./ai-service
    container_name: agrinova-ai-service
    restart: unless-stopped
    environment:
      - HUGGINGFACE_API_TOKEN=${HUGGINGFACE_API_TOKEN}
      - HUGGINGFACE_MODEL=${HUGGINGFACE_MODEL:-linkanjarad/mobilenet_v2_1.0_224-plant-disease-identification}
    ports:
      - "8000:8000"

  backend:
    build:
      context: ./backend
    container_name: agrinova-backend
    restart: unless-stopped
    depends_on:
      - mongodb
      - ai-service
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/agrinova
      - JWT_SECRET=${JWT_SECRET:-replace-me-in-production}
      - CLIENT_URL=http://localhost
      - AI_SERVICE_URL=http://ai-service:8000
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - DEFAULT_CITY=${DEFAULT_CITY:-Bengaluru}
    volumes:
      - backend-uploads:/app/uploads
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=/api
    container_name: agrinova-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

  nginx:
    image: nginx:1.27-alpine
    container_name: agrinova-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
      - ai-service
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  mongo-data:
  backend-uploads:
